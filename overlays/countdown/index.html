<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VCT Countdown</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="workspace">
      <section class="countdown-stage" aria-label="VCT countdown overlay">
        <video class="countdown-video" autoplay muted loop playsinline>
          <source src="../../assets/vct/overlay/countdown.web.mp4" type="video/mp4">
        </video>
        <div class="countdown-shade"></div>
        <div class="timer-shadow" id="timerShadow">05:00</div>
        <div class="timer" id="timer">05:00</div>
        <div class="now-playing" id="nowPlaying">Waiting for tosu</div>
      </section>

      <aside class="control-panel">
        <h1>VCT Countdown</h1>
        <div class="control-status" id="controlStatus">Starting countdown...</div>
        <button type="button" id="startButton">Start / Resume</button>
        <button type="button" id="pauseButton">Pause</button>
        <button type="button" id="resetButton">Reset 5:00</button>
        <div class="control-row">
          <button type="button" id="minusButton">-1 Min</button>
          <button type="button" id="plusButton">+1 Min</button>
        </div>
        <label>
          Minutes
          <input id="minutesInput" type="number" min="0" max="180" step="1" value="5">
        </label>
      </aside>
    </main>

    <script src="index.js"></script>
  </body>
</html>
