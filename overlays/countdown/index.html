<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VCT Countdown Video</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="workspace">
      <section class="countdown-stage" aria-label="VCT countdown video">
        <video id="countdownVideo" class="countdown-video" autoplay muted playsinline>
          <source src="../../assets/vct/overlay/countdown.web.mp4" type="video/mp4">
        </video>
        <div class="current-track is-visible" id="currentTrack" aria-live="polite">
          <span class="current-track-label">Currently listening:</span>
          <span id="currentTrackText">Waiting for osu client</span>
        </div>
      </section>

      <aside class="control-panel" aria-label="Countdown controls">
        <h1>VCT Countdown</h1>
        <div class="control-status" id="controlStatus">Loading video...</div>
        <button type="button" id="playButton">Play</button>
        <button type="button" id="pauseButton">Pause</button>
        <button type="button" id="restartButton">Restart Video</button>
        <div class="control-row">
          <button type="button" id="backButton">-10s</button>
          <button type="button" id="forwardButton">+10s</button>
        </div>
        <button type="button" id="muteButton">Unmute</button>
      </aside>
    </main>

    <script src="index.js"></script>
  </body>
</html>
