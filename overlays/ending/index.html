<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VCT Ending</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <video
      class="ending-video"
      src="../../assets/vct/overlay/ending-video.mp4"
      autoplay
      loop
      playsinline
      preload="auto"
    ></video>
    <script>
      const video = document.querySelector(".ending-video");
      video.play().catch(() => {
        video.muted = true;
        video.play();
      });
    </script>
  </body>
</html>
